openapi: 3.0.1
info:
  version: 1.0.0
  title: MediaShelf Backend API
  description: |-
    MediaShelf backend API documentation for authentication, audio uploads, movies, books, videos and images.
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
servers:
  - url: http://localhost:3000
tags:
  - name: auth
    description: Operations related to authentication
  - name: audio
    description: Operations related to audio upload and playback
  - name: movies
    description: Operations related to movie watchlist and favorites
  - name: books
    description: Operations related to book favorites and read lists
  - name: videos
    description: Operations related to video favorites and viewed lists
  - name: images
    description: Operations related to image favorites and viewed lists
  - name: readjourney
    description: ReadJourney proxy operations for book recommendations
paths:
  /api/auth/register:
    post:
      tags:
        - auth
      summary: Register a new user
      operationId: registerUser
      description: Register a new user with the provided details.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterUserRequest'
      responses:
        '201':
          description: Successfully registered a user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/IllegalInput'
        '409':
          description: Email in use
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/GeneralError'
  /api/auth/login:
    post:
      tags:
        - auth
      summary: Login a user
      operationId: loginUser
      description: Login a user with the provided credentials.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginUserRequest'
      responses:
        '200':
          description: Successfully logged in a user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/IllegalInput'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/GeneralError'
  /api/auth/logout:
    post:
      tags:
        - auth
      summary: Logout a user
      operationId: logoutUser
      description: Logout the currently authenticated user.
      responses:
        '204':
          description: Successfully logged out
        '400':
          $ref: '#/components/responses/IllegalInput'
        '404':
          description: Session not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/GeneralError'
  /api/auth/refresh:
    post:
      tags:
        - auth
      summary: Refresh user session
      operationId: refreshUserSession
      description: Refresh the session of the currently authenticated user.
      responses:
        '200':
          description: Successfully refreshed a session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          $ref: '#/components/responses/IllegalInput'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/GeneralError'
  /api/auth/send-reset-email:
    post:
      tags:
        - auth
      summary: Send password reset email
      operationId: sendResetEmail
      description: Send a password reset email to the user.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendResetEmailRequest'
      responses:
        '200':
          description: Reset password email has been successfully sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/GeneralError'
  /api/auth/reset-pwd:
    post:
      tags:
        - auth
      summary: Reset password
      operationId: resetPassword
      description: Reset the password of the user using the provided token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
      responses:
        '200':
          description: Password has been successfully reset
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/GeneralError'
  /api/audio:
    get:
      tags:
        - audio
      summary: Get uploaded audio list
      operationId: getAudioList
      description: Get the list of uploaded audio files for the authenticated user.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Successfully retrieved audio list
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    example: 200
                  message:
                    type: string
                    example: Audio list retrieved successfully
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Audio'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags:
        - audio
      summary: Upload a new audio file
      operationId: uploadAudio
      description: Upload a new audio file with metadata and optional cover image.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - audio
              properties:
                title:
                  type: string
                duration:
                  type: number
                  example: 180
                type:
                  type: string
                format:
                  type: string
                  example: mp3
                description:
                  type: string
                audio:
                  type: string
                  format: binary
      responses:
        '201':
          description: Audio uploaded successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    example: 201
                  message:
                    type: string
                    example: Audio uploaded successfully
                  data:
                    $ref: '#/components/schemas/Audio'
        '400':
          $ref: '#/components/responses/IllegalInput'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/audio/{audioId}:
    get:
      tags:
        - audio
      summary: Get audio details
      operationId: getAudioById
      description: Get metadata and playback URL for a single audio file.
      security:
        - bearerAuth: []
      parameters:
        - name: audioId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Audio metadata retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    example: 200
                  message:
                    type: string
                    example: Audio retrieved successfully
                  data:
                    $ref: '#/components/schemas/Audio'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags:
        - audio
      summary: Delete audio
      operationId: deleteAudioById
      description: Delete an uploaded audio file and its cover from storage.
      security:
        - bearerAuth: []
      parameters:
        - name: audioId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Audio deleted successfully
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/audio/{audioId}/duplicate:
    post:
      tags:
        - audio
      summary: Duplicate audio
      operationId: duplicateAudioById
      description: Create a duplicate entry of the selected audio for the authenticated user.
      security:
        - bearerAuth: []
      parameters:
        - name: audioId
          in: path
          required: true
          schema:
            type: string
      responses:
        '201':
          description: Audio duplicated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    example: 201
                  message:
                    type: string
                    example: Audio duplicated successfully
                  data:
                    $ref: '#/components/schemas/Audio'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/movies/watchlist:
    get:
      tags:
        - movies
      summary: Get movies watchlist
      operationId: getWatchlistMovies
      description: Get the authenticated user's watchlist movies.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Successfully retrieved watchlist movies
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    example: 200
                  message:
                    type: string
                    example: Watchlist movies retrieved successfully
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Movie'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags:
        - movies
      summary: Add movie to watchlist
      operationId: addToWatchlist
      description: Add a movie to the authenticated user's watchlist.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - movieId
                - title
              properties:
                movieId:
                  type: string
                title:
                  type: string
                posterUrl:
                  type: string
                releaseDate:
                  type: string
                  format: date
                rating:
                  type: number
                overview:
                  type: string
                genres:
                  type: array
                  items:
                    type: string
                poster:
                  type: string
                  format: binary
      responses:
        '201':
          description: Movie added to watchlist
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    example: 201
                  message:
                    type: string
                    example: Movie added to watchlist
                  data:
                    $ref: '#/components/schemas/Movie'
        '400':
          $ref: '#/components/responses/IllegalInput'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/movies/favorites:
    get:
      tags:
        - movies
      summary: Get favorite movies
      operationId: getFavoriteMovies
      description: Get the authenticated user's favorite movies.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Successfully retrieved favorite movies
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    example: 200
                  message:
                    type: string
                    example: Favorite movies retrieved successfully
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Movie'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags:
        - movies
      summary: Add movie to favorites
      operationId: addToFavorites
      description: Add a movie to the authenticated user's favorites.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - movieId
                - title
              properties:
                movieId:
                  type: string
                title:
                  type: string
                posterUrl:
                  type: string
                releaseDate:
                  type: string
                  format: date
                rating:
                  type: number
                overview:
                  type: string
                genres:
                  type: array
                  items:
                    type: string
                poster:
                  type: string
                  format: binary
      responses:
        '201':
          description: Movie added to favorites
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    example: 201
                  message:
                    type: string
                    example: Movie added to favorites
                  data:
                    $ref: '#/components/schemas/Movie'
        '400':
          $ref: '#/components/responses/IllegalInput'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/movies/watchlist/{movieId}:
    delete:
      tags:
        - movies
      summary: Remove movie from watchlist
      operationId: removeFromWatchlist
      description: Remove a movie from the authenticated user's watchlist.
      security:
        - bearerAuth: []
      parameters:
        - name: movieId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Movie removed from watchlist
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/movies/favorites/{movieId}:
    delete:
      tags:
        - movies
      summary: Remove movie from favorites
      operationId: removeFromFavorites
      description: Remove a movie from the authenticated user's favorites.
      security:
        - bearerAuth: []
      parameters:
        - name: movieId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Movie removed from favorites
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/movies/{movieId}/status:
    get:
      tags:
        - movies
      summary: Check movie status
      operationId: checkMovieStatus
      description: Check if a movie is in watchlist or favorites.
      security:
        - bearerAuth: []
      parameters:
        - name: movieId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Movie status retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    example: 200
                  message:
                    type: string
                    example: Movie status retrieved successfully
                  data:
                    type: object
                    properties:
                      isWatchlist:
                        type: boolean
                        example: true
                      isFavorite:
                        type: boolean
                        example: false
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/books/favorites:
    get:
      tags:
        - books
      summary: Get favorite books
      operationId: getFavoriteBooks
      description: Get the authenticated user's favorite books.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Successfully retrieved favorite books
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    example: 200
                  message:
                    type: string
                    example: Favorite books retrieved successfully
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Book'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags:
        - books
      summary: Add book to favorites
      operationId: addToFavoriteBooks
      description: Add a book to the authenticated user's favorites.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - bookId
                - title
              properties:
                bookId:
                  type: string
                title:
                  type: string
                bookUrl:
                  type: string
                coverUrl:
                  type: string
                author:
                  type: string
                rating:
                  type: number
                description:
                  type: string
                cover:
                  type: string
                  format: binary
      responses:
        '201':
          description: Book added to favorites
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    example: 201
                  message:
                    type: string
                    example: Book added to favorites
                  data:
                    $ref: '#/components/schemas/Book'
        '400':
          $ref: '#/components/responses/IllegalInput'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/books/read:
    get:
      tags:
        - books
      summary: Get read books
      operationId: getReadBooks
      description: Get the authenticated user's read books.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Successfully retrieved read books
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    example: 200
                  message:
                    type: string
                    example: Read books retrieved successfully
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Book'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags:
        - books
      summary: Add book to read list
      operationId: addToReadBooks
      description: Add a book to the authenticated user's read list.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - bookId
                - title
              properties:
                bookId:
                  type: string
                title:
                  type: string
                bookUrl:
                  type: string
                coverUrl:
                  type: string
                author:
                  type: string
                rating:
                  type: number
                description:
                  type: string
                cover:
                  type: string
                  format: binary
      responses:
        '201':
          description: Book added to read list
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    example: 201
                  message:
                    type: string
                    example: Book added to read list
                  data:
                    $ref: '#/components/schemas/Book'
        '400':
          $ref: '#/components/responses/IllegalInput'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/books/favorites/{bookId}:
    delete:
      tags:
        - books
      summary: Remove book from favorites
      operationId: removeFromFavoriteBooks
      description: Remove a book from the authenticated user's favorites.
      security:
        - bearerAuth: []
      parameters:
        - name: bookId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Book removed from favorites
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/books/read/{bookId}:
    delete:
      tags:
        - books
      summary: Remove book from read list
      operationId: removeFromReadBooks
      description: Remove a book from the authenticated user's read list.
      security:
        - bearerAuth: []
      parameters:
        - name: bookId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Book removed from read list
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/books/{bookId}/status:
    get:
      tags:
        - books
      summary: Check book status
      operationId: checkBookStatus
      description: Check if a book is in favorites or read list.
      security:
        - bearerAuth: []
      parameters:
        - name: bookId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Book status retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    example: 200
                  message:
                    type: string
                    example: Book status retrieved successfully
                  data:
                    type: object
                    properties:
                      isFavorite:
                        type: boolean
                        example: true
                      isRead:
                        type: boolean
                        example: false
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/videos/favorites:
    get:
      tags:
        - videos
      summary: Get favorite videos
      operationId: getFavoriteVideos
      description: Get the authenticated user's favorite videos.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Successfully retrieved favorite videos
