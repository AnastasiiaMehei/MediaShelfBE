                properties:
                  status:
                    type: integer
                    example: 200
                  message:
                    type: string
                    example: Favorite videos retrieved successfully
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Video'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags:
        - videos
      summary: Add video to favorites
      operationId: addToFavoriteVideos
      description: Add a video to the authenticated user's favorites.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - videoId
                - title
                - videoUrl
              properties:
                videoId:
                  type: string
                title:
                  type: string
                videoUrl:
                  type: string
                description:
                  type: string
                duration:
                  type: number
                coverUrl:
                  type: string
                cover:
                  type: string
                  format: binary
      responses:
        '201':
          description: Video added to favorites
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    example: 201
                  message:
                    type: string
                    example: Video added to favorites
                  data:
                    $ref: '#/components/schemas/Video'
        '400':
          $ref: '#/components/responses/IllegalInput'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/videos/viewed:
    get:
      tags:
        - videos
      summary: Get viewed videos
      operationId: getViewedVideos
      description: Get the authenticated user's viewed videos.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Successfully retrieved viewed videos
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    example: 200
                  message:
                    type: string
                    example: Viewed videos retrieved successfully
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Video'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags:
        - videos
      summary: Add video to viewed list
      operationId: addToViewedVideos
      description: Add a video to the authenticated user's viewed list.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - videoId
                - title
                - videoUrl
              properties:
                videoId:
                  type: string
                title:
                  type: string
                videoUrl:
                  type: string
                description:
                  type: string
                duration:
                  type: number
                coverUrl:
                  type: string
                cover:
                  type: string
                  format: binary
      responses:
        '201':
          description: Video added to viewed list
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    example: 201
                  message:
                    type: string
                    example: Video added to viewed list
                  data:
                    $ref: '#/components/schemas/Video'
        '400':
          $ref: '#/components/responses/IllegalInput'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/videos/favorites/{videoId}:
    delete:
      tags:
        - videos
      summary: Remove video from favorites
      operationId: removeFromFavoriteVideos
      description: Remove a video from the authenticated user's favorites.
      security:
        - bearerAuth: []
      parameters:
        - name: videoId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Video removed from favorites
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/videos/viewed/{videoId}:
    delete:
      tags:
        - videos
      summary: Remove video from viewed list
      operationId: removeFromViewedVideos
      description: Remove a video from the authenticated user's viewed list.
      security:
        - bearerAuth: []
      parameters:
        - name: videoId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Video removed from viewed list
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/videos/{videoId}/status:
    get:
      tags:
        - videos
      summary: Check video status
      operationId: checkVideoStatus
      description: Check if a video is in favorites or viewed list.
      security:
        - bearerAuth: []
      parameters:
        - name: videoId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Video status retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
